# agent-sandbox egress allowlist
#
# NOTE:
#   - Squid は重複/サブドメイン重複の dstdomain ACL を警告するため、
#     ".anthropic.com" と "api.anthropic.com" のような重ね書きをしない。
#   - 追加する MCP サーバのドメインは下の Allowlist セクションに追記する。

http_port 3128

# ---- Allowlist (Anthropic) ----
acl allowed_sites dstdomain api.anthropic.com
acl allowed_sites dstdomain console.anthropic.com

# ---- Allowlist (Claude OAuth / rebranded console) ----
# platform.claude.com (OAuth エンドポイント) を含む claude.com サブドメイン全般。
# `/login` を使う際に必須。
acl allowed_sites dstdomain .claude.com
acl allowed_sites dstdomain .claude.ai

# ---- Allowlist (GitHub) ----
acl allowed_sites dstdomain .github.com
acl allowed_sites dstdomain .githubusercontent.com

# ---- Allowlist (npm) ----
# CLI auto update を無効化している前提で、最小限のみ
acl allowed_sites dstdomain registry.npmjs.org

# ---- ポート / メソッド制限 ----
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

http_access allow allowed_sites
http_access deny all

# ---- ログ ----
# 注: ubuntu/squid イメージは proxy ユーザで起動するため /dev/stdout に書けない。
# 当面はアクセスログを無効化し、cache_log はデフォルト位置に書く。
# 監査が必要になったら logger sidecar を別 spec で追加する。
access_log none

# ---- キャッシュ ----
cache deny all
